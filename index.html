<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Live Studio Draft Uploader - Legal</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f8fc;
            --card: #ffffff;
            --text: #162033;
            --muted: #5d6982;
            --accent: #cf3d7b;
            --border: #d9e0ed;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #edf2f8 0%, var(--bg) 100%);
            color: var(--text);
        }

        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 18px 42px rgba(22, 32, 51, 0.07);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
            line-height: 1.2;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
        }

        .links {
            display: grid;
            gap: 14px;
            margin-top: 28px;
        }

        a {
            display: block;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            background: #fbfcff;
        }

        a:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .title {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .contact {
            margin-top: 24px;
            color: var(--muted);
        }

        .contact a {
            display: inline;
            padding: 0;
            border: 0;
            background: transparent;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main>
        <section class="card">
            <h1>TikTok Live Studio Draft Uploader</h1>
            <p>
                This page provides the public legal documents for the TikTok Live Studio Draft
                Uploader integration.
            </p>

            <div class="links">
                <a href="./terms.html">
                    <div class="title">Terms of Service</div>
                    <div>Read the terms that govern use of the app.</div>
                </a>
                <a href="./privacy.html">
                    <div class="title">Privacy Policy</div>
                    <div>Read how the app handles data and local session information.</div>
                </a>
            </div>

            <p class="contact">
                Contact: <a href="mailto:info@2usa.biz">info@2usa.biz</a>
            </p>
        </section>
    </main>
</body>
</html>
